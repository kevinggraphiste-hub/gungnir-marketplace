name: "Veille Twitch Renaud Dekode"
description: "Veille Twitch Renaud Dekode (via TwitchRSS). PREREQUIS : creez dans l'onglet Variables 'telegram_channel_id' (id de votre connexion canal Telegram dans Forge) et 'telegram_chat_id' (votre chat). Aucun secret n'est stocke dans ce workflow."
steps:
  - id: fetch_feed
    tool: http_request
    args:
      url: https://twitchrss.appspot.com/vod/renaud_dekode
      method: GET
      max_chars: 20000
  - id: first_item
    tool: regex_match
    args:
      text: '{{ steps.fetch_feed.text }}'
      pattern: '<item[^>]*>([\s\S]*?)</item>'
  - id: guid
    tool: regex_match
    args:
      text: '{{ steps.first_item.groups.0 }}'
      pattern: '<guid[^>]*>\s*(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?\s*</guid>'
  - id: title
    tool: regex_match
    args:
      text: '{{ steps.first_item.groups.0 }}'
      pattern: '<title>\s*(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?\s*</title>'
  - id: link
    tool: regex_match
    args:
      text: '{{ steps.first_item.groups.0 }}'
      pattern: '<link>\s*([\s\S]*?)\s*</link>'
  - id: pubdate
    tool: regex_match
    args:
      text: '{{ steps.first_item.groups.0 }}'
      pattern: '<pubDate>\s*([\s\S]*?)\s*</pubDate>'
  - id: check_new
    tool: forge_get_global
    continue_on_error: true
    args:
      key: renaud_twitch_last_guid
  - id: save_new_guid
    tool: forge_set_global
    if: "{{ steps.guid.matched }} and '{{ steps.guid.groups.0 }}' != '{{ steps.check_new.value }}'"
    args:
      key: renaud_twitch_last_guid
      value: '{{ steps.guid.groups.0 }}'
  - id: save_new_title
    tool: forge_set_global
    if: "{{ steps.guid.matched }} and '{{ steps.guid.groups.0 }}' != '{{ steps.check_new.value }}'"
    args:
      key: renaud_twitch_last_title
      value: '{{ steps.title.groups.0 }}'
  - id: send_telegram
    tool: channel_send
    if: "{{ steps.guid.matched }} and '{{ steps.guid.groups.0 }}' != '{{ steps.check_new.value }}'"
    args:
      channel_id: '{{ globals.telegram_channel_id }}'
      chat_id: '{{ globals.telegram_chat_id }}'
      message: |-
        Nouveau live/VOD Twitch - Renaud Dekode

        {{ steps.title.groups.0 }}
        {{ steps.link.groups.0 }}

        {{ steps.pubdate.groups.0 }}